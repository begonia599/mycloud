services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: clouddisk
      POSTGRES_USER: clouddisk
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clouddisk"]
      interval: 5s
      timeout: 5s
      retries: 5

  cloud:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-8090}:8080"
    volumes:
      - file_storage:/app/uploads
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=clouddisk
      - DB_USER=clouddisk
      - DB_PASSWORD=${DB_PASSWORD}
      - PLATFORM_URL=http://app:8080
      - PLATFORM_PUBLIC_URL=https://core.bgnhub.me
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - myplatform_default

volumes:
  pg_data:
  file_storage:

networks:
  myplatform_default:
    external: true
